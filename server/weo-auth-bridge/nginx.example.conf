# Example: expose the bridge under the same host as New API.
#
# The Weo CLI defaults WEO_BRIDGE_URL to the platform host; with this layout
# set WEO_BRIDGE_URL=https://api.weo.asia/bridge in the CLI environment (or
# leave it and proxy /oauth + /weo at the host root instead — see below).

# Option A: bridge under a /bridge prefix (matches PUBLIC_BASE_URL above).
location /bridge/ {
    proxy_pass http://127.0.0.1:8787/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
}

# Option B: serve the bridge routes at the host root (no CLI override needed).
# Use this only if these paths don't collide with New API.
# location /oauth/ { proxy_pass http://127.0.0.1:8787; }
# location /weo/   { proxy_pass http://127.0.0.1:8787; }
